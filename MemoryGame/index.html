<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zen Memory - Rahatlatıcı Hafıza Oyunu</title>
    <meta name="description"
        content="Stressiz, rahatlatıcı bir hafıza kartı eşleştirme oyunu. Pastel tonlarda modern tasarım ile huzurlu bir oyun deneyimi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Ambient floating shapes background -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
    </div>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <div class="start-container">
            <div class="logo-area">
                <div class="logo-anim">
                    <div class="stack-card sc-1">✦</div>
                    <div class="stack-card sc-2">✦</div>
                    <div class="stack-card sc-3">✦</div>
                    <div class="stack-card sc-center">🃏</div>
                </div>
                <h1 class="logo-title">Zen Memory</h1>
                <p class="logo-subtitle">Rahatlatıcı Hafıza Oyunu</p>
            </div>

            <div class="settings-panel">
                <!-- Mode Selection -->
                <div class="setting-group">
                    <label class="setting-label">Oyun Modu</label>
                    <div class="mode-selector" id="mode-selector">
                        <button class="mode-btn active" data-mode="single">
                            <span class="mode-icon">👤</span>
                            <span class="mode-name">Tek Kişilik</span>
                        </button>
                        <button class="mode-btn" data-mode="multi">
                            <span class="mode-icon">👥</span>
                            <span class="mode-name">İki Kişilik</span>
                        </button>
                    </div>
                </div>

                <!-- Theme Selection -->
                <div class="setting-group">
                    <label class="setting-label">Tema Seç</label>
                    <div class="theme-selector" id="theme-selector">
                        <button class="theme-btn active" data-theme="fruits" title="Meyveler">
                            <span class="theme-icon">🍉</span>
                            <span class="theme-name">Meyveler</span>
                        </button>
                        <button class="theme-btn" data-theme="toys" title="Oyuncaklar">
                            <span class="theme-icon">🧸</span>
                            <span class="theme-name">Oyuncaklar</span>
                        </button>
                        <button class="theme-btn" data-theme="party" title="Parti">
                            <span class="theme-icon">🎈</span>
                            <span class="theme-name">Parti</span>
                        </button>
                        <button class="theme-btn" data-theme="symbols" title="Semboller">
                            <span class="theme-icon">⭐</span>
                            <span class="theme-name">Semboller</span>
                        </button>
                        <button class="theme-btn" data-theme="ocean" title="Deniz">
                            <span class="theme-icon">🐠</span>
                            <span class="theme-name">Deniz</span>
                        </button>
                        <button class="theme-btn" data-theme="vehicles" title="Araçlar">
                            <span class="theme-icon">🚗</span>
                            <span class="theme-name">Araçlar</span>
                        </button>
                        <button class="theme-btn" data-theme="art" title="Sanat">
                            <span class="theme-icon">🎨</span>
                            <span class="theme-name">Sanat</span>
                        </button>
                        <button class="theme-btn" data-theme="sports" title="Spor">
                            <span class="theme-icon">⚽</span>
                            <span class="theme-name">Spor</span>
                        </button>
                        <button class="theme-btn" data-theme="food" title="Yemek">
                            <span class="theme-icon">🍔</span>
                            <span class="theme-name">Yemek</span>
                        </button>
                        <button class="theme-btn" data-theme="nature" title="Doğa">
                            <span class="theme-icon">🌳</span>
                            <span class="theme-name">Doğa</span>
                        </button>
                    </div>
                </div>

                <!-- Grid Size Selection -->
                <div class="setting-group">
                    <label class="setting-label">Zorluk Seviyesi</label>
                    <div class="grid-selector" id="grid-selector">
                        <button class="grid-btn active" data-grid="4">
                            <span class="grid-size">4×4</span>
                            <span class="grid-desc">Kolay</span>
                        </button>
                        <button class="grid-btn" data-grid="6">
                            <span class="grid-size">6×6</span>
                            <span class="grid-desc">Orta</span>
                        </button>
                        <button class="grid-btn" data-grid="8">
                            <span class="grid-size">8×8</span>
                            <span class="grid-desc">Zor</span>
                        </button>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="start-btn">
                <span>Oyuna Başla</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <!-- Top Bar -->
        <header class="game-header">
            <div class="header-left">
                <button id="back-btn" class="icon-btn" title="Ana Menü">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <div id="single-info" class="game-stats">
                    <div class="game-info">
                        <span class="info-label">Hamle</span>
                        <span class="info-value" id="move-counter">0</span>
                    </div>
                    <div class="game-info">
                        <span class="info-label">Eşleşme</span>
                        <span class="info-value" id="match-counter">0 / 0</span>
                    </div>
                </div>
                <div id="multi-info" class="game-stats hidden">
                    <div class="game-info player-box active" id="p1-box">
                        <span class="info-label">1. Oyuncu</span>
                        <span class="info-value" id="p1-score">0</span>
                    </div>
                    <div class="game-info player-box" id="p2-box">
                        <span class="info-label">2. Oyuncu</span>
                        <span class="info-value" id="p2-score">0</span>
                    </div>
                </div>
            </div>
            <div class="header-center">
                <button id="hint-btn" class="powerup-btn" title="Bir eşleşmeyi göster">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <span>İpucu</span>
                    <span class="powerup-badge">1</span>
                </button>
                <button id="peek-btn" class="powerup-btn" title="Tüm kartları göster">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span>Göz At</span>
                    <span class="powerup-badge">1</span>
                </button>
                <button id="shuffle-btn" class="powerup-btn" title="Kartları karıştır">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"></polyline>
                        <line x1="4" y1="20" x2="21" y2="3"></line>
                        <polyline points="21 16 21 21 16 21"></polyline>
                        <line x1="15" y1="15" x2="21" y2="21"></line>
                        <line x1="4" y1="4" x2="9" y2="9"></line>
                    </svg>
                    <span>Karıştır</span>
                    <span class="powerup-badge">1</span>
                </button>
            </div>
            <div class="header-right">
                <button id="sound-btn" class="icon-btn" title="Ses Aç/Kapat">
                    <svg class="sound-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                    <svg class="sound-off hidden" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Feedback Toast -->
        <div id="feedback-toast" class="feedback-toast"></div>

        <!-- Game Board -->
        <div class="board-wrapper">
            <!-- Left side decorations -->
            <div class="side-decor side-left">
                <div class="float-shape fs-1">✦</div>
                <div class="float-shape fs-2">♡</div>
                <div class="float-shape fs-3">✧</div>
                <div class="float-shape fs-4">◇</div>
            </div>
            <div id="game-board" class="game-board"></div>
            <!-- Right side decorations -->
            <div class="side-decor side-right">
                <div class="float-shape fs-5">✦</div>
                <div class="float-shape fs-6">♡</div>
                <div class="float-shape fs-7">✧</div>
                <div class="float-shape fs-8">◇</div>
            </div>
        </div>
    </div>

    <!-- WIN SCREEN -->
    <div id="win-screen" class="screen">
        <div class="win-container">
            <div class="win-particles" id="win-particles"></div>
            <div class="win-content">
                <div class="win-icon">🎉</div>
                <h2 class="win-title">Tebrikler!</h2>
                <p class="win-subtitle">Tüm kartları eşleştirdin</p>
                <div class="win-stats" id="win-stats-single">
                    <div class="win-stat">
                        <span class="stat-value" id="final-moves">0</span>
                        <span class="stat-label">Hamle</span>
                    </div>
                    <div class="win-stat">
                        <span class="stat-value" id="final-pairs">0</span>
                        <span class="stat-label">Eşleşme</span>
                    </div>
                </div>
                <div class="win-stats hidden" id="win-stats-multi">
                    <div class="win-stat">
                        <span class="stat-value" id="final-p1-score">0</span>
                        <span class="stat-label">1. Oyuncu</span>
                    </div>
                    <div class="win-stat">
                        <span class="stat-value" id="final-p2-score">0</span>
                        <span class="stat-label">2. Oyuncu</span>
                    </div>
                </div>
                <div class="win-actions">
                    <button id="menu-btn" class="start-btn">
                        <span>Ana Menüye Dön</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </button>
                    <button id="replay-btn" class="secondary-btn">Tekrar Oyna</button>
                </div>
            </div>
        </div>
    </div>

    <script src="icons.js"></script>
    <script src="audio.js"></script>
    <script src="game.js"></script>
</body>

</html>
